<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subfinder Results | Subdomain Enumeration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: #1a1a2e; color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .stats { background: #16213e; color: white; padding: 20px; display: flex; justify-content: space-around; flex-wrap: wrap; }
        .stat-card { text-align: center; padding: 15px; }
        .stat-number { font-size: 2em; font-weight: bold; color: #4CAF50; }
        .stat-label { margin-top: 5px; opacity: 0.8; }
        .content { padding: 30px; }
        .search-box { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .subdomain-list { list-style: none; }
        .subdomain-item { background: #f8f9fa; margin: 10px 0; padding: 15px; border-radius: 8px; border-left: 4px solid #4CAF50; display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s; }
        .subdomain-item:hover { transform: translateX(5px); background: #e9ecef; }
        .subdomain-name { font-family: monospace; font-size: 14px; word-break: break-all; }
        .badge { background: #4CAF50; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .footer { background: #f1f1f1; padding: 20px; text-align: center; color: #666; font-size: 14px; }
        .loading { text-align: center; padding: 50px; font-size: 18px; color: #666; }
        .error { background: #f44336; color: white; padding: 15px; border-radius: 8px; margin: 20px; }
        @media (max-width: 768px) { .subdomain-item { flex-direction: column; align-items: flex-start; gap: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Subfinder Results</h1>
            <p>Fast passive subdomain enumeration by ProjectDiscovery</p>
        </div>
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Subdomains</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueSources">0</div>
                <div class="stat-label">Data Sources</div>
            </div>
        </div>
        <div class="content">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔎 Filter subdomains..." onkeyup="filterSubdomains()">
            </div>
            <div id="results">
                <div class="loading">Loading subdomains...</div>
            </div>
        </div>
        <div class="footer">
            <p>Generated with <strong>subfinder</strong> | Data from passive sources (CRT.sh, AlienVault, etc.)</p>
            <p style="margin-top: 10px;">📅 Scan date: <span id="scanDate"></span></p>
        </div>
    </div>

    <script>
        let allSubdomains = [];

        async function loadResults() {
            try {
                const response = await fetch('results.json');
                if (!response.ok) throw new Error('Could not load results.json');
                const data = await response.text();
                
                // Parse JSONL format (each line is a JSON object)
                const lines = data.trim().split('\n');
                allSubdomains = lines.map(line => {
                    try {
                        return JSON.parse(line);
                    } catch(e) { return null; }
                }).filter(item => item && item.host);
                
                displayStats();
                displaySubdomains(allSubdomains);
                document.getElementById('scanDate').textContent = new Date().toLocaleString();
            } catch(error) {
                document.getElementById('results').innerHTML = '<div class="error">❌ Error loading results. Make sure results.json exists in the same directory.</div>';
                console.error('Error:', error);
            }
        }

        function displayStats() {
            const sources = new Set();
            allSubdomains.forEach(s => {
                if (s.sources) s.sources.forEach(src => sources.add(src));
            });
            document.getElementById('totalCount').textContent = allSubdomains.length;
            document.getElementById('uniqueSources').textContent = sources.size || 'Multiple';
        }

        function displaySubdomains(subdomains) {
            const container = document.getElementById('results');
            if (subdomains.length === 0) {
                container.innerHTML = '<div class="loading">🔍 No matching subdomains found</div>';
                return;
            }
            
            container.innerHTML = `
                <ul class="subdomain-list">
                    ${subdomains.map(s => `
                        <li class="subdomain-item">
                            <span class="subdomain-name">${escapeHtml(s.host)}</span>
                            <span class="badge">${s.sources ? s.sources[0] : 'unknown'}</span>
                        </li>
                    `).join('')}
                </ul>
            `;
        }

        function filterSubdomains() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allSubdomains.filter(s => s.host.toLowerCase().includes(searchTerm));
            displaySubdomains(filtered);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadResults();
    </script>
</body>
</html>
